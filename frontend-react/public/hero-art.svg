<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#1a1428"/>
      <stop offset="40%" stop-color="#12101e"/>
      <stop offset="100%" stop-color="#08070e"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#915F6D" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#915F6D" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#915F6D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9BA5E5" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#9BA5E5" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#9BA5E5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E6E9F9" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#E6E9F9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#915F6D" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#B87385" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#915F6D" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="line2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9BA5E5" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#E6E9F9" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#9BA5E5" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="80"/>
    </filter>
    <filter id="blur3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <!-- Base background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Large ambient glows -->
  <ellipse cx="960" cy="380" rx="600" ry="500" fill="url(#glow1)" filter="url(#blur2)"/>
  <ellipse cx="400" cy="300" rx="450" ry="400" fill="url(#glow2)" filter="url(#blur2)"/>
  <ellipse cx="1500" cy="500" rx="400" ry="350" fill="url(#glow2)" filter="url(#blur2)"/>

  <!-- Central bright orb -->
  <ellipse cx="960" cy="440" rx="200" ry="200" fill="url(#glow3)" filter="url(#blur1)"/>
  <circle cx="960" cy="440" r="80" fill="#E6E9F9" opacity="0.03" filter="url(#blur1)"/>

  <!-- Geometric constellation lines -->
  <g opacity="0.6">
    <!-- Primary structure -->
    <line x1="400" y1="200" x2="960" y2="440" stroke="url(#line1)" stroke-width="0.8"/>
    <line x1="960" y1="440" x2="1520" y2="280" stroke="url(#line1)" stroke-width="0.8"/>
    <line x1="960" y1="440" x2="700" y2="700" stroke="url(#line2)" stroke-width="0.6"/>
    <line x1="960" y1="440" x2="1300" y2="680" stroke="url(#line2)" stroke-width="0.6"/>
    <line x1="400" y1="200" x2="700" y2="700" stroke="url(#line1)" stroke-width="0.5"/>
    <line x1="1520" y1="280" x2="1300" y2="680" stroke="url(#line1)" stroke-width="0.5"/>

    <!-- Secondary web -->
    <line x1="200" y1="500" x2="400" y2="200" stroke="url(#line2)" stroke-width="0.4"/>
    <line x1="200" y1="500" x2="700" y2="700" stroke="url(#line2)" stroke-width="0.4"/>
    <line x1="1700" y1="450" x2="1520" y2="280" stroke="url(#line1)" stroke-width="0.4"/>
    <line x1="1700" y1="450" x2="1300" y2="680" stroke="url(#line1)" stroke-width="0.4"/>
    <line x1="600" y1="100" x2="960" y2="440" stroke="url(#line2)" stroke-width="0.3"/>
    <line x1="1350" y1="120" x2="960" y2="440" stroke="url(#line1)" stroke-width="0.3"/>
  </g>

  <!-- Nodes / stars at intersections -->
  <g>
    <circle cx="960" cy="440" r="4" fill="#E6E9F9" opacity="0.7"/>
    <circle cx="960" cy="440" r="12" fill="none" stroke="#E6E9F9" stroke-width="0.5" opacity="0.3"/>

    <circle cx="400" cy="200" r="3" fill="#B87385" opacity="0.8"/>
    <circle cx="400" cy="200" r="8" fill="none" stroke="#B87385" stroke-width="0.4" opacity="0.3"/>

    <circle cx="1520" cy="280" r="3" fill="#9BA5E5" opacity="0.8"/>
    <circle cx="1520" cy="280" r="8" fill="none" stroke="#9BA5E5" stroke-width="0.4" opacity="0.3"/>

    <circle cx="700" cy="700" r="2.5" fill="#B87385" opacity="0.6"/>
    <circle cx="1300" cy="680" r="2.5" fill="#9BA5E5" opacity="0.6"/>
    <circle cx="200" cy="500" r="2" fill="#E6E9F9" opacity="0.4"/>
    <circle cx="1700" cy="450" r="2" fill="#E6E9F9" opacity="0.4"/>
    <circle cx="600" cy="100" r="1.5" fill="#B87385" opacity="0.5"/>
    <circle cx="1350" cy="120" r="1.5" fill="#9BA5E5" opacity="0.5"/>
  </g>

  <!-- Scattered small stars -->
  <g opacity="0.5">
    <circle cx="150" cy="120" r="1" fill="#E6E9F9"/>
    <circle cx="300" cy="450" r="0.8" fill="#E6E9F9"/>
    <circle cx="520" cy="380" r="1.2" fill="#B87385"/>
    <circle cx="780" cy="180" r="0.8" fill="#E6E9F9"/>
    <circle cx="1100" cy="200" r="1" fill="#9BA5E5"/>
    <circle cx="1250" cy="380" r="0.7" fill="#E6E9F9"/>
    <circle cx="1600" cy="150" r="1" fill="#E6E9F9"/>
    <circle cx="1750" cy="350" r="0.8" fill="#B87385"/>
    <circle cx="1800" cy="600" r="1" fill="#9BA5E5"/>
    <circle cx="100" cy="700" r="0.8" fill="#E6E9F9"/>
    <circle cx="450" cy="580" r="1" fill="#B87385"/>
    <circle cx="850" cy="650" r="0.7" fill="#E6E9F9"/>
    <circle cx="1050" cy="550" r="1.2" fill="#9BA5E5"/>
    <circle cx="1400" cy="500" r="0.8" fill="#E6E9F9"/>
    <circle cx="500" cy="900" r="1" fill="#B87385"/>
    <circle cx="1100" cy="850" r="0.8" fill="#9BA5E5"/>
    <circle cx="1650" cy="750" r="1" fill="#E6E9F9"/>
    <circle cx="250" cy="850" r="0.7" fill="#E6E9F9"/>
  </g>

  <!-- Subtle inner ring/arc decoration -->
  <circle cx="960" cy="440" r="280" fill="none" stroke="#915F6D" stroke-width="0.4" opacity="0.15" stroke-dasharray="4 8"/>
  <circle cx="960" cy="440" r="180" fill="none" stroke="#E6E9F9" stroke-width="0.3" opacity="0.1" stroke-dasharray="2 12"/>

  <!-- Grain/noise texture overlay -->
  <filter id="noise">
    <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
  </filter>
  <rect width="1920" height="1080" filter="url(#noise)" opacity="0.02"/>
</svg>

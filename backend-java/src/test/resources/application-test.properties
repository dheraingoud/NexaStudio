# Test profile configuration
# NOTE: spring.profiles.active cannot be set in profile-specific files

# Use H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Use simple in-memory cache
spring.cache.type=simple

# JWT Configuration (test)
jwt.secret=TestSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLongForHS256
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Gemini Configuration (mock for tests)
gemini.api.key=test-api-key
gemini.api.base-url=https://test.example.com
gemini.api.model=gemini-test
gemini.api.max-tokens=1000
gemini.api.temperature=0.7
gemini.api.timeout=5000

# Storage Configuration
storage.base-path=${java.io.tmpdir}/nexastudio-test

# Preview Configuration
preview.base-port=4100
preview.max-instances=2
preview.timeout=60000

# CORS
cors.allowed-origins=http://localhost:3000
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.max-age=3600

# Rate limiting disabled for tests
rate-limit.enabled=false
rate-limit.requests-per-minute=1000
rate-limit.ai-requests-per-hour=1000

# Supabase (mock for tests)
supabase.url=https://test.supabase.co
supabase.anon-key=test-anon-key
supabase.service-role-key=test-service-key

# Logging
logging.level.root=WARN
logging.level.com.nexastudio=DEBUG

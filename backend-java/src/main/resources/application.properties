# NexaStudio Backend Configuration

# Server Configuration
server.port=8080
server.servlet.context-path=/api
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Compression — speeds up JSON/SSE payloads
server.compression.enabled=true
server.compression.mime-types=application/json,text/event-stream,text/plain,text/html
server.compression.min-response-size=1024

# Tomcat tuning — SSE threads can be long-lived
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.connection-timeout=30000
server.tomcat.keep-alive-timeout=300000

# Async SSE timeout — must be >= SseEmitter timeout
spring.mvc.async.request-timeout=300000

# Application Name
spring.application.name=nexastudio-backend

# ===========================================
# Database Configuration (Supabase PostgreSQL)
# ===========================================
# Using Session Pooler for IPv4 compatibility
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/nexastudio}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# H2 Console (disabled for production)
spring.h2.console.enabled=false

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ===========================================
# JWT Configuration
# ===========================================
jwt.secret=${JWT_SECRET:}
jwt.expiration=604800000
jwt.refresh-expiration=2592000000

# ===========================================
# Gemini AI Configuration (Fallback Provider)
# ===========================================
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.base-url=https://generativelanguage.googleapis.com/v1beta
gemini.api.model=gemini-2.5-flash
gemini.api.model-fallback=gemini-2.5-pro
gemini.api.max-tokens=65536
gemini.api.temperature=0.7
gemini.api.timeout=300000

# ===========================================
# NVIDIA NIM AI Models Configuration
# Single API key for all models: Step-3.5-Flash → MiniMax M2.5 → Kimi K2.5
# ===========================================
nvidia.api.key=${NVIDIA_API_KEY:}
nvidia.api.base-url=https://integrate.api.nvidia.com/v1

# Model configurations (all use the same API key)
nvidia.step.model=stepfun/step-3.5-flash
nvidia.step.max-tokens=16384
nvidia.step.temperature=0.7
nvidia.step.timeout=60000

nvidia.minimax.model=minimax/minimax-m2.5
nvidia.minimax.max-tokens=16384
nvidia.minimax.temperature=0.7
nvidia.minimax.timeout=90000

nvidia.kimi.model=moonshotai/kimi-k2.5
nvidia.kimi.max-tokens=16384
nvidia.kimi.temperature=0.7
nvidia.kimi.timeout=190000

# Cache Configuration
spring.cache.type=simple

# ===========================================
# Supabase Configuration
# ===========================================
supabase.url=${SUPABASE_URL:}
supabase.anon-key=${SUPABASE_ANON_KEY:}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}

# ===========================================
# File Storage Configuration
# ===========================================
storage.base-path=${java.io.tmpdir}/nexastudio
storage.max-file-size=10MB
storage.allowed-extensions=.ts,.tsx,.js,.jsx,.json,.css,.html,.md,.txt

# ===========================================
# Preview Configuration
# ===========================================
preview.base-port=3100
preview.max-instances=10
preview.timeout=300000

# ===========================================
# Rate Limiting (in-memory)
# ===========================================
rate-limit.requests-per-minute=60
rate-limit.ai-requests-per-hour=100
rate-limit.enabled=true

# ===========================================
# CORS Configuration
# ===========================================
cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:5175,https://mgztcyopiexmvkuefoam.supabase.co
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.max-age=3600

# ===========================================
# Logging (simplified)
# ===========================================
logging.level.root=WARN
logging.level.com.nexastudio=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=WARN

# ===========================================
# Actuator
# ===========================================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

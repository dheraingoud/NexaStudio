# ═══════════════════════════════════════════════════════════════════
# NexaStudio Backend - Production Configuration
# ═══════════════════════════════════════════════════════════════════
# Activated with: SPRING_PROFILES_ACTIVE=production
# All sensitive values MUST come from environment variables
# ═══════════════════════════════════════════════════════════════════

spring.application.name=nexastudio-backend

# ─────────────────────────────────────────────────────────────────────
# Server Configuration
# ─────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}
server.servlet.context-path=/api

# ─────────────────────────────────────────────────────────────────────
# Database Configuration (Render PostgreSQL)
# ─────────────────────────────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL}?sslmode=require
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (optimized for serverless)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─────────────────────────────────────────────────────────────────────
# Security Configuration
# ─────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ─────────────────────────────────────────────────────────────────────
# AI Model Configuration
# ─────────────────────────────────────────────────────────────────────
# NVIDIA NIM API (single key for all models)
nvidia.api.key=${NVIDIA_API_KEY}
nvidia.api.base-url=https://integrate.api.nvidia.com/v1

# Model endpoints (all use the same NVIDIA base URL)
nvidia.minimax.model=minimax/minimax-m2-5
nvidia.step.model=step-ai/step-3-5-flash
nvidia.kimi.model=moonshotai/kimi-k2-5-instruct

# Gemini fallback
gemini.api.key=${GEMINI_API_KEY}
gemini.api.base-url=https://generativelanguage.googleapis.com/v1beta
gemini.model=gemini-2.5-flash

# ─────────────────────────────────────────────────────────────────────
# CORS Configuration (update with your frontend URL)
# ─────────────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ORIGINS:https://nexastudio-cg7o.onrender.com,http://localhost:5173,http://localhost:3000}
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.max-age=3600

# ─────────────────────────────────────────────────────────────────────
# Logging (production-optimized)
# ─────────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.nexastudio=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ─────────────────────────────────────────────────────────────────────
# Actuator (health checks for Render)
# ─────────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.health.db.enabled=true

# ─────────────────────────────────────────────────────────────────────
# File Storage (temporary, use cloud storage for production)
# ─────────────────────────────────────────────────────────────────────
storage.base-path=/tmp/nexastudio

# NexaStudio Render Blueprint
# https://render.com/docs/blueprint-spec

services:
  # ═══════════════════════════════════════════════════════════════════
  # Backend API - Spring Boot (Docker)
  # ═══════════════════════════════════════════════════════════════════
  - type: web
    name: nexastudio-api
    runtime: docker
    repo: https://github.com/dheraingoud/NexaStudio.git
    branch: main
    rootDir: backend-java
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: DATABASE_URL
        sync: false  # Set in Render Dashboard
      - key: DATABASE_USER
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false  # Set to frontend URL after deployment

  # ═══════════════════════════════════════════════════════════════════
  # Frontend - React Static Site
  # ═══════════════════════════════════════════════════════════════════
  - type: web
    name: nexastudio
    runtime: static
    repo: https://github.com/dheraingoud/NexaStudio.git
    branch: main
    rootDir: frontend-react
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false  # Set to backend URL + /api
